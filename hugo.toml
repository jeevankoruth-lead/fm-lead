baseURL = 'https://fmlead.com/'
languageCode = 'en-us'
title = 'FM-Lead'
theme = 'blowfish'
enableRobotsTXT = true

[params]
  description = "FM-Lead blends technical facility leadership insights with reflective commentary across Focus Mindset and Free Muser."
  keywords = ["facility management", "data center operations", "critical facilities", "engineering leadership", "operations strategy", "FM-Lead"]
  images = ["/logo-v2.png"]
  robots = "index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1"
  disableAssetsBusting = true
  custom_CSS = ["css/custom.css"]

  [params.Author]
    name = "FM-Lead"

  [params.article]
    showDate = false
    showDateUpdated = false

  [params.list]
    groupByYear = false

  [params.term]
    groupByYear = false

  [params.footer]
    showCopyright = false

[themes.focus]
  primary = "#0A2342"
  background = "#FFFFFF"
  text = "#0A2342"

[themes.muser]
  primary = "#FF4F00"
  background = "#FFF7F0"
  text = "#1A1A1A"

  [[menu.main]]
  name = "Focus Mindset"
  url = "/focus/"
  weight = 1
  identifier = "focus"

[[menu.main]]
  name = "Free Muser"
  url = "/muser/"
  weight = 2
  identifier = "muser"

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

[imaging]
  quality = 75
  resampleFilter = "Lanczos"
  anchor = "Smart"

  