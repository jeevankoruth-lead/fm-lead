<header class="custom-header">
  <div class="header-row">
    <nav class="header-nav left-nav">
      {{ range .Site.Menus.main }}
        {{ if eq .Identifier "focus" }}
          <a href="{{ .URL }}">{{ .Name }}</a>
        {{ end }}
      {{ end }}
    </nav>
    <nav class="header-nav right-nav">
      {{ range .Site.Menus.main }}
        {{ if eq .Identifier "muser" }}
          <a href="{{ .URL }}">{{ .Name }}</a>
        {{ end }}
      {{ end }}
    </nav>
  </div>
</header>
