<header class="custom-header">
  <div class="header-row">
    <nav class="header-nav left-nav menu-list">
      <a href="{{ "/focus/articles/" | relURL }}">Articles</a>
      <a href="{{ "/focus/projects/" | relURL }}">Projects</a>
      <a href="{{ "/focus/technical/" | relURL }}">Technical</a>
    </nav>
    <button
      id="appearance-switcher"
      type="button"
      class="reading-mode-toggle reading-mode-toggle-desktop"
      aria-label="Toggle day and night reading mode"
      title="Toggle day and night reading mode">
      <span class="reading-mode-toggle-track" aria-hidden="true">
        <span class="reading-mode-icon reading-mode-icon-day">☀️</span>
        <span class="reading-mode-icon reading-mode-icon-night">🌙</span>
        <span class="reading-mode-toggle-thumb"></span>
      </span>
    </button>
    <button
      id="appearance-switcher-mobile"
      type="button"
      class="reading-mode-toggle reading-mode-toggle-mobile"
      aria-label="Toggle day and night reading mode"
      title="Toggle day and night reading mode">
      <span class="reading-mode-toggle-track" aria-hidden="true">
        <span class="reading-mode-icon reading-mode-icon-day">☀️</span>
        <span class="reading-mode-icon reading-mode-icon-night">🌙</span>
        <span class="reading-mode-toggle-thumb"></span>
      </span>
    </button>
    <nav class="header-nav right-nav menu-list">
      <a href="{{ "/muser/reviews/" | relURL }}">Reviews</a>
      <a href="{{ "/muser/satire/" | relURL }}">Satire</a>
      <a href="{{ "/muser/opinions/" | relURL }}">Opinions</a>
    </nav>
  </div>
</header>
